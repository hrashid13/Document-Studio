    <script>window.__ARTICLE_DATA__ = {"projectName":"Final Project","createdAt":"2026-07-05T22:26:10.334Z","updatedAt":"2026-07-06T23:09:24.277Z","media":[{"id":"media_0001","type":"image","originalFilename":"Chart 1.png","storedPath":"assets/media_0001.png","tags":[],"metadata":{"width":1443,"height":886}},{"id":"media_0002","type":"image","originalFilename":"Chart 2.png","storedPath":"assets/media_0002.png","tags":[],"metadata":{"width":1422,"height":887}},{"id":"media_0003","type":"image","originalFilename":"Chart 3.png","storedPath":"assets/media_0003.png","tags":[],"metadata":{"width":1235,"height":861}},{"id":"media_0004","type":"image","originalFilename":"Chart 4.png","storedPath":"assets/media_0004.png","tags":[],"metadata":{"width":1438,"height":888}},{"id":"media_0005","type":"image","originalFilename":"Chart 5.png","storedPath":"assets/media_0005.png","tags":[],"metadata":{"width":1446,"height":902}},{"id":"media_0006","type":"image","originalFilename":"Chart 6.png","storedPath":"assets/media_0006.png","tags":[],"metadata":{"width":1442,"height":906}},{"id":"media_0007","type":"file","originalFilename":"FinalProject.twbx","storedPath":"assets/media_0007.twbx","tags":[]},{"id":"media_0008","type":"image","originalFilename":"Screenshot 2026-07-05 192456.png","storedPath":"assets/media_0008.png","tags":[],"metadata":{"width":1438,"height":900}}],"blocks":[{"id":"block_0001","order":0,"rawText":"Florida Tourism and Hospitality Employment\n","treatments":[],"style":{"align":"center"}},{"id":"block_0038","order":1,"rawText":"An Analysis of Tourism Intensity, Wages, and COVID-19 Recovery Across the Florida Counties ","treatments":[],"style":{"align":"center"}},{"id":"block_0039","order":2,"rawText":"ISM 6419 Data Visualization ","treatments":[],"style":{"align":"center"}},{"id":"block_0040","order":3,"rawText":"Hesham Rashid","treatments":[],"style":{"align":"center"}},{"id":"block_0037","order":4,"rawText":"Tableau Workbook of all visualizations:","treatments":[{"type":"attachment","config":{"fileId":"media_0007","label":""}}],"style":{"align":"center"}},{"id":"block_0002","order":5,"rawText":"Introduction","treatments":[{"type":"heading","config":{"level":1}}],"style":{"align":"center"}},{"id":"block_0003","order":6,"rawText":"Tourism is one of Florida's most vital industries, accounting for a substantial share of employment and economic activity across all 67 counties. The state's hospitality sector, which encompasses hotels, restaurants, theme parks, and related services, draws tens of millions of visitors annually and supports over one million jobs. However, the economic contribution of tourism is not evenly distributed. Some counties, particularly those anchored by major theme parks or resort destinations, are far more dependent on hospitality employment than others. Understanding this variation, and how it was disrupted by the COVID-19 pandemic, provides important insight into the structure and resilience of Florida's tourism economy.","treatments":[]},{"id":"block_0004","order":7,"rawText":"The COVID-19 pandemic of 2020 delivered an unprecedented shock to Florida's hospitality sector. Travel restrictions, theme park closures, and reduced consumer confidence caused hotel taxable sales statewide to collapse and hospitality employment to fall sharply. By 2023, however, most counties had recovered, and in some cases surpassed, their pre-pandemic employment levels. The speed and completeness of that recovery varied significantly by county, raising questions about whether tourism-heavy counties fared better or worse than more economically diversified ones.","treatments":[]},{"id":"block_0005","order":8,"rawText":"This project addresses the following two research questions:","treatments":[{"type":"heading","config":{"level":3}}],"style":{"align":"center"}},{"id":"block_0006","order":9,"rawText":"1. Do Florida counties with higher hotel taxable sales show stronger hospitality employment and wages relative to their population size?","treatments":[{"type":"scroll-reveal","config":{"direction":"left","delay":0}}]},{"id":"block_0007","order":10,"rawText":"2. How did the COVID-19 pandemic affect hospitality employment across Florida counties, and did theme-park-heavy counties recover differently than beach-destination counties by 2023?","treatments":[{"type":"scroll-reveal","config":{"direction":"right","delay":0}}]},{"id":"block_0008","order":11,"rawText":"Methodology","treatments":[{"type":"heading","config":{"level":1}}],"style":{"align":"center"}},{"id":"block_0009","order":12,"rawText":"This project draws on three data sources, each covering the period from 2018 through 2023.","treatments":[]},{"id":"block_0010","order":13,"rawText":"Bureau of Labor Statistics: Quarterly Census of Employment and Wages (QCEW)","treatments":[{"type":"heading","config":{"level":3}}]},{"id":"block_0011","order":14,"rawText":"The QCEW provides county-level employment and wage data by industry. This analysis uses annual data filtered to Florida counties, private-sector establishments, and NAICS industry code 72 (Accommodation and Food Services), which covers hotels, restaurants, theme parks, and related businesses. The variables extracted are average annual employment level and average annual pay per worker. Source","treatments":[{"type":"inline-link","config":{"display":"inline","triggerPhrase":"Source","url":"https://www.bls.gov/cew/downloadable-data-files.htm","label":"BLS Source"}}],"style":{"align":"left"}},{"id":"block_0012","order":15,"rawText":"Florida Department of Revenue: Form 10 Taxable Sales by County and Industry","treatments":[{"type":"heading","config":{"level":3}}]},{"id":"block_0013","order":16,"rawText":"The Florida DOR publishes annual taxable sales data by county and industry kind code. This analysis uses Kind Code 39 (Hotels, Rooming Houses, Apartments, and Tourist Courts), which captures all taxable transient rental sales, a direct measure of lodging revenue and a reliable proxy for tourism intensity at the county level. The data is published as fiscal year files (July–June); monthly values were summed by calendar year to align with the BLS data. Source","treatments":[{"type":"inline-link","config":{"display":"inline","triggerPhrase":"Source","url":"https://floridarevenue.com/dataPortal/Pages/TaxResearch.aspx","label":"Learn more"}}]},{"id":"block_0014","order":17,"rawText":"Florida Bureau of Economic and Business Research (BEBR) County Population Estimates","treatments":[{"type":"heading","config":{"level":3}}]},{"id":"block_0015","order":18,"rawText":"Annual county population estimates published by the University of Florida's Bureau of Economic and Business Research, based on the Florida Demographic Estimating Conference. Population data was used to normalize employment and hotel sales figures on a per-capita basis, enabling meaningful comparisons across counties of vastly different sizes. Source","treatments":[{"type":"inline-link","config":{"display":"inline","triggerPhrase":"Source","url":"https://edr.state.fl.us/content/population-demographics/data/CountyPopulation_2025.pdf","label":"Learn more"}}]},{"id":"block_0016","order":19,"rawText":"All three datasets were imported into Tableau and linked by county name and year. Calculated fields were created to derive hotel taxable sales per capita and hospitality workers per 1,000 residents, enabling population-normalized comparisons across all 67 Florida counties.","treatments":[]},{"id":"block_0017","order":20,"rawText":"Analysis","treatments":[{"type":"heading","config":{"level":1}}],"style":{"align":"center"}},{"id":"block_0018","order":21,"rawText":"1 Hotel Taxable Sales Per Capita by County (Animated Map)","treatments":[{"type":"heading","config":{"level":3}}]},{"id":"block_0019","order":22,"rawText":" The animated choropleth map reveals that tourism revenue intensity, which is measured as hotel taxable sales per capita, is highly concentrated in a small number of counties. Monroe County (Key West) and Walton County (the 30A and Destin corridor) consistently lead the state, with per capita hotel sales of $22,092 and $15,782 respectively in 2023. Orange County, home to Walt Disney World and Universal Studios, ranks fifth at $5,792 per capita which is lower than its raw sales rank would suggest, reflecting its large residential population. The animation makes the 2020 COVID shock immediately visible: nearly every county lightens sharply in 2020 as hotel revenue collapsed, before darkening again through 2021–2023 as tourism recovered. The map directly addresses the geographic dimension of Research Question 1, showing that per-capita tourism intensity does not simply follow population size.","treatments":[{"type":"drag-compare","config":{"imageA":"media_0008","imageB":"media_0001","labelA":"2018","labelB":"2023"}}]},{"id":"block_0020","order":23,"rawText":"2 Tourism Dependency, Hospitality Workers Per 1,000 Residents (2023)","treatments":[{"type":"heading","config":{"level":3}}]},{"id":"block_0021","order":24,"rawText":" ","treatments":[{"type":"scrolly","config":{"visualType":"image","position":"right","chartTitle":"","steps":[{"id":"step_1","text":"The animated choropleth map reveals that tourism revenue intensity, which is measured as hotel taxable sales per capita, is highly concentrated in a small number of counties. Monroe County (Key West) and Walton County (the 30A and Destin corridor) consistently lead the state, with per capita hotel sales of $22,092 and $15,782 respectively in 2023. Orange County, home to Walt Disney World and Universal Studios, ranks fifth at $5,792 per capita which is lower than its raw sales rank would suggest, reflecting its large residential population. The animation makes the 2020 COVID shock immediately visible: nearly every county lightens sharply in 2020 as hotel revenue collapsed, before darkening again through 2021–2023 as tourism recovered. The map directly addresses the geographic dimension of Research Question 1, showing that per-capita tourism intensity does not simply follow population size.","imageId":"media_0002","chartData":""}]}}]},{"id":"block_0022","order":25,"rawText":"3 Tourism Revenue vs. Average Annual Wages (2023)","treatments":[{"type":"heading","config":{"level":3}}]},{"id":"block_0023","order":26,"rawText":" ","treatments":[{"type":"scrolly","config":{"visualType":"image","position":"left","chartTitle":"","steps":[{"id":"step_1","text":"The scatter plot compares hotel taxable sales volume against average annual pay for hospitality workers across all Florida counties in 2023. A general positive trend is visible, but not very strong: counties with higher hotel sales tend to offer higher wages. However, there are outliers emerging. Monroe County shows the highest average annual wages in the state at approximately $240,000, reflecting both the high cost of living in the Florida Keys and the premium pricing of Key West's lodging market, despite moderate raw sales volume. Orange County and Miami-Dade are clear outliers on the sales axis, generating far more hotel revenue than any other county, yet their average wages are not proportionally higher. This suggests that high-volume tourism markets do not automatically translate into higher individual worker compensation, potentially reflecting the large share of low-wage food service employment in theme park counties.","imageId":"media_0003","chartData":""}]}}]},{"id":"block_0024","order":27,"rawText":"4 COVID-19 Employment Recovery by County (2020 vs. 2023)","treatments":[{"type":"heading","config":{"level":3}}]},{"id":"block_0025","order":28,"rawText":" ","treatments":[{"type":"scrolly","config":{"visualType":"image","position":"right","chartTitle":"","steps":[{"id":"step_1","text":"The grouped bar chart comparing 2020 and 2023 hospitality employment directly addresses Research Question 2. Statewide, hospitality employment fell from 1,015,155 in 2019 to 819,664 in 2020, a decline of approximately 195,000 jobs, or 19.2%. By 2023, statewide employment had recovered to 1,036,874, exceeding pre-pandemic levels. At the county level, the COVID impact was most severe in Orange County (-29.0%), Miami-Dade (-27.7%), Broward (-22.2%), and Osceola (-20.4%), which are all major theme park or urban tourism markets. Beach destination counties fared comparatively better during the initial shock, with Gulf County recording a modest increase. By 2023, every major county shown in the chart had a 2023 bar visibly longer than its 2020 bar, confirming broad recovery. Theme-park-heavy Orange and Osceola counties, despite suffering the largest absolute drops, also posted strong recovery figures, driven by both the reopening and expansion of Walt Disney World and Universal Studios.","imageId":"media_0004","chartData":""}]}}]},{"id":"block_0026","order":29,"rawText":"5 Hospitality Employment Over Time by County (2018–2023)","treatments":[{"type":"heading","config":{"level":3}}]},{"id":"block_0027","order":30,"rawText":" ","treatments":[{"type":"scrolly","config":{"visualType":"image","position":"left","chartTitle":"","steps":[{"id":"step_1","text":"The multi-line chart displays annual average hospitality employment for all 67 Florida counties from 2018 through 2023, with each line representing a single county. The most immediate and consistent pattern across every county is the sharp V-shaped decline in 2020 followed by a recovery trajectory through 2021–2023. The magnitude of that decline and the pace of recovery, however, varied considerably across counties. The largest counties by employment, Broward, Miami-Dade, Hillsborough, and Palm Beach, are clearly visible as the highest lines on the chart and show the steepest absolute drops in 2020. Smaller counties cluster near the bottom of the chart but exhibit the same directional pattern. By 2023, most counties had returned to or exceeded their 2019 employment levels, with the upper-tier counties largely recovering their pre-pandemic workforce size. The visualization confirms that the COVID shock was a statewide phenomenon rather than isolated to regions, while also highlighting the disproportionate scale of employment in Florida's largest metropolitan counties.","imageId":"media_0005","chartData":""}]}}]},{"id":"block_0028","order":31,"rawText":"6 Hotel Sales and Employment Trend Over Time by County","treatments":[{"type":"heading","config":{"level":3}}]},{"id":"block_0029","order":32,"rawText":" ","treatments":[{"type":"scrolly","config":{"visualType":"image","position":"right","chartTitle":"","steps":[{"id":"step_1","text":"The dual-variable line chart allows exploration of how hotel taxable sales and hospitality employment moved in tandem over the 2018–2023 period for any selected Florida county. Filtered to Orange County as a representative example, both metrics follow a consistent pattern: gradual growth from 2018 to 2019, a sharp V-shaped decline in 2020, partial recovery in 2021, and a strong rebound in 2022–2023. The chart is interactive — viewers can select any Florida county from the filter to compare its specific trajectory. Notably, for high-tourism counties such as Orange and Monroe, hotel sales surged past pre-pandemic levels more rapidly than employment, suggesting that post-pandemic pricing power (higher average daily rates) drove revenue recovery faster than the labor market could absorb returning workers. The color gradient encoding employment level reinforces this relationship visually, darkening as both metrics recover across the selected county.","imageId":"media_0006","chartData":""}]}}]},{"id":"block_0030","order":33,"rawText":"Conclusion","treatments":[{"type":"heading","config":{"level":1}}],"style":{"align":"center"}},{"id":"block_0031","order":34,"rawText":"The analysis provides clear answers to both research questions. Regarding Research Question 1, Florida counties with higher hotel taxable sales per capita do show substantially stronger hospitality employment concentration relative to their populations. Monroe, Walton, and Orange counties lead the state in both per-capita hotel revenue and hospitality workers per 1,000 residents, confirming that tourism intensity and labor market dependence on hospitality are closely linked. The relationship between tourism revenue and average wages is positive but less linear, high-volume counties like Orange and Miami-Dade do not necessarily pay the highest individual wages, which could be due to the composition of their workforce which skews toward lower-wage food service roles.","treatments":[{"type":"sentence-focus","config":{"style":"dim"}}]},{"id":"block_0032","order":35,"rawText":"Regarding Research Question 2, the COVID-19 pandemic had a severe but temporary impact on Florida's hospitality sector. Theme-park-heavy counties suffered the largest employment declines in 2020, with Orange County losing 29% of its hospitality workforce in a single year. Beach destination counties were more resilient during the initial shock, likely because outdoor leisure travel recovered faster than large indoor theme park attendance. However, by 2023, both county types had recovered strongly, with statewide hospitality employment exceeding pre-pandemic levels. The faster recovery of hotel revenue relative to employment in Orange County suggests that pricing dynamics, rather than visitor volume alone, drove the revenue rebound.","treatments":[{"type":"sentence-focus","config":{"style":"dim"}}]},{"id":"block_0033","order":36,"rawText":"Several additional research questions emerge from this analysis:","treatments":[{"type":"heading","config":{"level":3}}]},{"id":"block_0034","order":37,"rawText":"1. To what extent did the growth of short-term rental platforms such as Airbnb and VRBO contribute to the faster revenue recovery observed in beach destination counties relative to theme park counties after 2020?","treatments":[{"type":"scroll-reveal","config":{"direction":"up","delay":0}}]},{"id":"block_0035","order":38,"rawText":"2. Do counties with higher tourism dependency show greater income inequality between hospitality workers and workers in other sectors, and has that gap widened since the pandemic?","treatments":[{"type":"scroll-reveal","config":{"direction":"up","delay":0}}]},{"id":"block_0036","order":39,"rawText":"3. How do hurricane seasons and major weather events affect the relationship between hotel taxable sales and hospitality employment in Florida's coastal counties, and do more tourism-dependent counties exhibit greater vulnerability to weather-related economic disruption?","treatments":[{"type":"scroll-reveal","config":{"direction":"up","delay":0}}]}],"style":{"bgColor":"cream","textColor":"ink","accentColor":"ocean"},"theme":"editorial"};</script>
